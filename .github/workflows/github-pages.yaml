name: Build & Deploy Documentation (dev)

on:
  workflow_dispatch:

  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-deploy:
    name: Build and Deploy - dev
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build - tests, mutation, javadoc, Allure
        run: |
          mvn clean
          mvn verify org.pitest:pitest-maven:mutationCoverage
          mvn javadoc:javadoc allure:report

      # TODO: Improve extraction
      - name: Extract metrics
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          COVERAGE=$(grep -o 'Total[^%]*%' target/site/jacoco/index.html | grep -o '[0-9]\+%' | head -n1 | tr -d '%')
          TESTS=$(grep -o 'tests="[0-9]*"' target/surefire-reports/*.xml | grep -o '[0-9]*' | awk '{s+=$1} END {print s}')

          mkdir -p public
          cat > public/metrics.json <<EOF
          {
            "version":   "$VERSION",
            "coverage":  ${COVERAGE:-0},
            "tests":     ${TESTS:-0},
            "status":    "OK",
            "timestamp": $(date +%s)
          }
          EOF

      - name: Inject theme into JaCoCo and PIT reports
        run: |
          python3 .github/scripts/inject_theme.py \
            target/site/jacoco \
            gh-pages/custom-theme.css
          python3 .github/scripts/inject_theme.py \
            target/pit-reports \
            gh-pages/custom-theme.css

      - name: Prepare content - hub + versioned dev/
        run: |
          cp -r gh-pages/* public/

          mkdir -p public/dev
          cp -r target/reports/apidocs                 public/dev/javadoc
          cp -r target/site/allure-maven-plugin        public/dev/tests
          cp -r target/site/jacoco                     public/dev/coverage
          cp -r target/pit-reports                     public/dev/mutation

      - name: Update versions.json
        run: |
          python3 - <<'EOF'
          import json
          from pathlib import Path

          f = Path("public/versions.json")
          data = json.loads(f.read_text()) if f.exists() else {"latest": None, "versions": []}

          if "dev" not in data["versions"]:
              data["versions"].append("dev")

          f.write_text(json.dumps(data, indent=2))
          print(f"versions.json updated: {data}")
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true