name: Build & Deploy Documentation (release)

on:
  workflow_dispatch:

  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-deploy:
    name: Build and Deploy - ${{ github.ref_name }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Resolve release version
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build - tests, mutation, javadoc, Allure
        run: |
          mvn clean
          mvn verify org.pitest:pitest-maven:mutationCoverage
          mvn javadoc:javadoc allure:report

      - name: Inject theme and obsolete banner
        run: |
          python3 .github/scripts/inject_theme.py \
            target/site/jacoco \
            gh-pages/custom-theme.css \
            --banner
          python3 .github/scripts/inject_theme.py \
            target/pit-reports \
            gh-pages/custom-theme.css \
            --banner

      - name: Prepare versioned content - ${{ steps.version.outputs.tag }}/
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          mkdir -p "public/${VERSION}"
          cp -r target/reports/apidocs                 "public/${VERSION}/javadoc"
          cp -r target/site/allure-maven-plugin        "public/${VERSION}/tests"
          cp -r target/site/jacoco                     "public/${VERSION}/coverage"
          cp -r target/pit-reports                     "public/${VERSION}/mutation"

      - name: Update versions.json
        run: |
          python3 - <<'EOF'
          import json, os
          from pathlib import Path

          tag = os.environ["VERSION_TAG"]
          f = Path("public/versions.json")
          data = json.loads(f.read_text()) if f.exists() else {"latest": None, "versions": []}

          if tag not in data["versions"]:
              try:
                  dev_index = data["versions"].index("dev")
                  data["versions"].insert(dev_index, tag)
              except ValueError:
                  data["versions"].insert(0, tag)

          data["latest"] = tag
          f.write_text(json.dumps(data, indent=2))
          print(f"versions.json mis à jour : {data}")
          EOF
        env:
          VERSION_TAG: ${{ steps.version.outputs.tag }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true