<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YASCL - Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>YASCL</h1>
    <p class="subtitle">Yet Another Scientific Computing Library in Java</p>

    <div class="metrics">
        <div class="metric">
            <h3>Version</h3>
            <p id="version">--</p>
        </div>

        <div class="metric">
            <h3>Coverage</h3>
            <p id="coverage">--%</p>
        </div>

        <div class="metric">
            <h3>Tests</h3>
            <p id="tests">--</p>
        </div>

        <div class="metric">
            <h3>Status</h3>
            <p id="status">--</p>
        </div>

        <div class="metric">
            <h3>Last Update</h3>
            <p id="lastUpdated">--</p>
        </div>
    </div>

    <div class="grid">
        <a href="./javadoc/index.html" class="card">
            <h2>Documentation</h2>
            <p>Browse the Javadoc API</p>
        </a>

        <a href="./coverage/index.html" class="card">
            <h2>Coverage</h2>
            <p>View JaCoCo reports</p>
        </a>

        <a href="https://im2ag-sonar.univ-grenoble-alpes.fr/dashboard?id=projet-m1-devops-yascl" class="card" target="_blank">
            <h2>Code Quality</h2>
            <p>SonarQube dashboard</p>
        </a>

        <a href="https://github.com/totolemarto/Support_biblio_scientifique_java" class="card" target="_blank">
            <h2>Source Code</h2>
            <p>GitHub repository</p>
        </a>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
